---
# k3s_server.yml
# Installs and configures a single-node k3s server on pi-1.local:
#   - Downloads and runs the official k3s install script
#   - Configures k3s to use systemd cgroup driver
#   - Ensures k3s is enabled and started (survives reboot)
#   - Waits for the node to reach Ready state

- name: Install and configure k3s server
  hosts: k3s_server
  become: true
  gather_facts: true

  vars:
    k3s_version: v1.29.3+k3s1
    k3s_install_url: https://get.k3s.io
    k3s_config_dir: /etc/rancher/k3s
    k3s_config_file: /etc/rancher/k3s/config.yaml

  tasks:

    # ── Pre-checks ────────────────────────────────────────────────────────────
    - name: Verify swap is off (zram excluded)
      shell: swapon --show --noheadings | grep -v zram || true
      register: swap_check
      changed_when: false
      failed_when: swap_check.stdout | trim != ""

    - name: Verify cgroup memory is enabled
      command: grep -c "cgroup_memory=1" /proc/cmdline
      register: cgroup_check
      changed_when: false
      failed_when: cgroup_check.rc != 0

    # ── k3s configuration ─────────────────────────────────────────────────────
    - name: Ensure k3s config directory exists
      file:
        path: "{{ k3s_config_dir }}"
        state: directory
        mode: "0755"

    - name: Write k3s server config
      copy:
        dest: "{{ k3s_config_file }}"
        content: |
          # k3s server configuration
          # Generated by Ansible — do not edit manually

          # Use systemd cgroup driver (required for Raspberry Pi OS)
          kubelet-arg:
            - "cgroup-driver=systemd"

          # TLS SANs so the kubeconfig server address resolves from local machine
          tls-san:
            - pi-1.local

          # Disable servicelb (MetalLB is used instead)
          disable:
            - servicelb

          # Write kubeconfig readable by the deploying user
          write-kubeconfig-mode: "0644"
        mode: "0644"
      register: k3s_config_changed

    # ── Install k3s ───────────────────────────────────────────────────────────
    - name: Check if k3s is already installed
      stat:
        path: /usr/local/bin/k3s
      register: k3s_binary

    - name: Download and install k3s
      shell: |
        set -euo pipefail
        curl -sfL {{ k3s_install_url }} | \
          INSTALL_K3S_VERSION={{ k3s_version }} \
          INSTALL_K3S_EXEC="server" \
          sh -
      when: not k3s_binary.stat.exists
      args:
        executable: /bin/bash

    # ── Service management ────────────────────────────────────────────────────
    - name: Ensure k3s service is enabled and running
      systemd:
        name: k3s
        state: started
        enabled: true
        daemon_reload: true

    - name: Remove k3s serving cert so it regenerates with new SANs
      file:
        path: /var/lib/rancher/k3s/server/tls/serving-kube-apiserver.crt
        state: absent
      when: k3s_config_changed.changed

    - name: Restart k3s if config changed
      systemd:
        name: k3s
        state: restarted
      when: k3s_config_changed.changed

    # ── Wait for cluster ready ────────────────────────────────────────────────
    - name: Wait for k3s kubeconfig to appear
      wait_for:
        path: /etc/rancher/k3s/k3s.yaml
        timeout: 120

    - name: Wait for node to reach Ready state
      command: k3s kubectl get nodes --no-headers
      register: node_status
      until: "'Ready' in node_status.stdout and 'NotReady' not in node_status.stdout"
      retries: 30
      delay: 10
      changed_when: false

    - name: Show node status
      debug:
        msg: "{{ node_status.stdout_lines }}"
