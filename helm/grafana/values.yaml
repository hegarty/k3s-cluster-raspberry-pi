                  "unit": "s",
                  "decimals": 1,
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      {
                        "color": "red",
                        "value": null
                      },
                      {
                        "color": "yellow",
                        "value": 0
                      },
                      {
                        "color": "green",
                        "value": 30
                      }
                    ]
                  }
                }
              },
              "options": {
                "reduceOptions": {
                  "calcs": [
                    "lastNotNull"
                  ],
                  "fields": "",
                  "values": false
                },
                "colorMode": "background"
              },
              "gridPos": {
                "h": 6,
                "w": 4,
                "x": 4,
                "y": 1
              }
            },
            {
              "id": 23,
