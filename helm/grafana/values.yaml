# Grafana values for single-node k3s cluster on Raspberry Pi LAN

persistence:
  enabled: true
  storageClassName: local-path
  size: 1Gi

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Expose via ClusterIP — accessed through Traefik ingress
service:
  type: ClusterIP

# Default admin credentials — override via Ansible vault in production
adminUser: admin
adminPassword: changeme

# Pre-configured datasource pointing at in-cluster Prometheus
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-kube-prometheus-prometheus.monitoring.svc:9090
        access: proxy
        isDefault: true

# Dashboard providers — file-based provisioning from mounted paths
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        options:
          path: /var/lib/grafana/dashboards/default

dashboards:
  default:
    node-exporter:
      gnetId: 1860        # Node Exporter Full — community dashboard
      revision: 37
      datasource: Prometheus
    wifi-quality-overview:
      json: |
        {
          "id": null,
          "uid": "wifi-quality-overview",
          "title": "WiFi Quality Overview",
          "description": "Portable overview of WiFi reliability, stability, loss, and user experience signals. Includes host/link indicators for congestion diagnosis; true RF telemetry requires an additional wireless exporter.",
          "timezone": "browser",
          "schemaVersion": 39,
          "version": 3,
          "refresh": "5s",
          "panels": [
            {
              "id": 20,
              "type": "row",
              "title": "SLO Status",
              "collapsed": false,
              "gridPos": {
                "h": 1,
                "w": 24,
                "x": 0,
                "y": 0
              }
            },
            {
              "id": 21,
              "type": "stat",
              "title": "Availability SLO \u2014 WAN Uptime (30d)",
              "description": "Target: 99.998% \u2014 allows 60 seconds of downtime per month",
              "datasource": "Prometheus",
              "targets": [
                {
                  "expr": "avg_over_time(wan_reachable{job=\"gateway-monitor\"}[30d]) * 100",
                  "refId": "A"
                }
              ],
              "fieldConfig": {
                "defaults": {
                  "unit": "percent",
                  "decimals": 4,
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      {
                        "color": "red",
                        "value": null
                      },
                      {
                        "color": "yellow",
                        "value": 99.9
                      },
                      {
                        "color": "green",
                        "value": 99.998
                      }
                    ]
                  }
                }
              },
              "options": {
                "reduceOptions": {
                  "calcs": [
                    "lastNotNull"
                  ],
                  "fields": "",
                  "values": false
                },
                "colorMode": "background"
              },
              "gridPos": {
                "h": 6,
                "w": 4,
                "x": 0,
                "y": 1
              }
            },
            {
              "id": 22,
              "type": "stat",
              "title": "Error Budget Remaining (30d)",
              "description": "Seconds of WAN downtime budget left this month. Budget = 60s total.",
              "datasource": "Prometheus",
              "targets": [
                {
                  "expr": "60 - (1 - avg_over_time(wan_reachable{job=\"gateway-monitor\"}[30d])) * 2592000",
