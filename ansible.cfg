[defaults]
inventory         = inventory/hosts.yml
remote_user       = terence
private_key_file  = ~/.ssh/id_ed25519
host_key_checking = False
retry_files_enabled = False
stdout_callback   = default
result_format     = yaml

[ssh_connection]
ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
pipelining = True
